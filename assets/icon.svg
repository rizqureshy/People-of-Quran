<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="People of Scriptures">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f0c94e"/>
      <stop offset="1" stop-color="#d8a838"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="15" fill="#0a0a1c"/>
  <!-- Unifying ring -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="url(#g)" stroke-width="2.4"/>
  <!-- Star of David (Judaism) -->
  <g fill="none" stroke="url(#g)" stroke-width="2.2" stroke-linejoin="round">
    <polygon points="32,12 40.66,27 23.34,27"/>
    <polygon points="32,32 23.34,17 40.66,17"/>
  </g>
  <!-- Crescent (Islam) -->
  <path d="M26 35 A9 9 0 1 0 26 53 A6.6 6.6 0 1 1 26 35 Z" fill="url(#g)"/>
  <!-- Cross (Christianity) -->
  <g fill="url(#g)">
    <rect x="41.4" y="35" width="3.2" height="18" rx="1.1"/>
    <rect x="37.5" y="41.5" width="11" height="3.2" rx="1.1"/>
  </g>
</svg>
