name: Deploy to GitHub Pages

# Publishes the static site so it can be opened on any device (incl. phones)
# over HTTPS, where ES modules and WebGL load correctly.
#
# One-time setup: in the repo, go to Settings → Pages → Build and deployment →
# Source: "GitHub Actions". After that this runs automatically on every push.

on:
  push:
    branches: [ "main", "claude/beautiful-cray-e7l4rg" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
